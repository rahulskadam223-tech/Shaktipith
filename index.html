}

function FoodAnalyzer({logs,setLogs}){
  const[input,setInput]=useState("");
  const[imgFile,setImgFile]=useState(null);
  const[imgPreview,setImgPreview]=useState(null);
  const[result,setResult]=useState(null);
  const[loading,setLoading]=useState(false);
  const fileRef=useRef();

    if(!input&&!imgFile)return;
    setLoading(true);setResult(null);
    try{
      const prompt=`Analyze this Indian/home-cooked dish. Return ONLY valid JSON:\n{"dish":"name","serving":"size","calories":number,"protein_g":number,"carbs_g":number,"total_fat_g":number,"good_fat_g":number,"bad_fat_g":number,"fiber_g":number,"pros":["p1","p2","p3"],"cons":["c1","c2"],"tip":"one tip"}`;
      let messages;
      if(imgFile){messages=[{role:"user",content:[{type:"image",source:{type:"base64",media_type:imgFile.type,data:imgPreview.split(",")[1]}},{type:"text",text:prompt}]}];}
      else{messages=[{role:"user",content:`Dish: "${input}". ${prompt}`}];}
      const text=await callClaude(messages,"You are a nutrition expert in Indian home-cooked meals. Return only valid JSON, no markdown.");
      const parsed=JSON.parse(text.replace(/```json|```/g,"").trim());
      setResult(parsed);
      setLogs(l=>({...l,food:[...l.food,{name:parsed.dish,calories:parsed.calories}],calorieHistory:[...(l.calorieHistory||[]),parsed.calories]}));
    }catch{setResult({error:"Could not analyze. Please try again."});}
    setLoading(false);

      React.createElement("input",{style:{...inp,marginBottom:10},placeholder:"Dal Chawal, Roti Sabzi, Poha...",value:input,onChange:e=>setInput(e.target.value),onKeyDown:e=>e.key==="Enter"&&analyze()}),

        React.createElement("button",{style:{...btn(),flex:2},onClick:analyze,disabled:loading},loading?"Analyzing...":"Analyze 🔍")

      React.createElement("div",{style:{color:C.blue,fontWeight:600}},"Analyzing nutrition...")
    ),
    result&&!result.error&&React.createElement("div",{style:card},
      React.createElement("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"flex-start",flexWrap:"wrap",gap:10,marginBottom:16}},
        React.createElement("div",null,
          React.createElement("div",{style:{fontSize:20,fontWeight:700,letterSpacing:-0.5}},result.dish),
          React.createElement("div",{style:{color:C.gray,fontSize:12,marginTop:2}},result.serving)),
        React.createElement("div",{style:{background:C.orange+"22",borderRadius:12,padding:"10px 16px",textAlign:"center",border:`1px solid ${C.orange}44`}},
          React.createElement("div",{style:{fontSize:26,fontWeight:800,color:C.orange,letterSpacing:-1}},result.calories),
          React.createElement("div",{style:{fontSize:10,color:C.gray,textTransform:"uppercase"}},"kcal"))
      ),
      React.createElement("div",{style:{marginBottom:14}},
        React.createElement(Sparkline,{data:logs.calorieHistory||[],color:C.orange,height:40})
      ),
      React.createElement("div",{style:{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:8,marginBottom:16}},
        [{l:"Protein",v:result.protein_g,c:C.blue},{l:"Carbs",v:result.carbs_g,c:C.yellow},{l:"Fat",v:result.total_fat_g,c:C.red},{l:"Good Fat",v:result.good_fat_g,c:C.green},{l:"Bad Fat",v:result.bad_fat_g,c:C.red},{l:"Fiber",v:result.fiber_g,c:C.purple}].map(m=>
          React.createElement("div",{key:m.l,style:{background:C.surface2,borderRadius:10,padding:"10px 6px",textAlign:"center"}},

    const ctx=`User: ${profile.name||"Warrior"}, Age:${profile.age||"?"}, Height:${profile.height||"?"}cm, Weight:${profile.weight||"?"}kg. Water:${water}/${waterTarget}L. Sleep:${sleepHours}hrs. Food:${logs.food.map(f=>`${f.name}(${f.calories}kcal)`).join(",")||"none"}. Workouts:${logs.workouts.map(w=>w.day).join(",")||"none"}. Cardio:${logs.cardio.map(c=>`${c.type} ${c.minutes}min`).join(",")||"none"}. Today:${today}-${WORKOUT_SPLIT[today].muscles}.`;
    const history=msgs.map(m=>({role:m.role==="ai"?"assistant":"user",content:m.text}));

    setMsgs(m=>[...m,{role:"ai",text:resp}]);setLoading(false);
  };
  const quick=["Today's training?","Review my diet","Yoga sequence","Am I progressing?"];
  return React.createElement("div",null,

    ),
    React.createElement("div",{style:{...card,height:360,overflowY:"auto",display:"flex",flexDirection:"column",gap:10}},
      msgs.map((m,i)=>React.createElement("div",{key:i,style:{display:"flex",justifyContent:m.role==="ai"?"flex-start":"flex-end"}},
        React.createElement("div",{style:{background:m.role==="ai"?C.surface2:C.blue,borderRadius:m.role==="ai"?"4px 16px 16px 16px":"16px 4px 16px 16px",padding:"10px 14px",maxWidth:"85%",fontSize:13,lineHeight:1.7,whiteSpace:"pre-wrap"}},m.text)
      )),
      loading&&React.createElement("div",{style:{alignSelf:"flex-start"}},
        React.createElement("div",{style:{background:C.surface2,borderRadius:"4px 16px 16px 16px",padding:"10px 14px",color:C.gray,fontSize:13}},"Guruji is thinking... 🙏")),
      React.createElement("div",{ref:bottomRef})
    ),

function Profile({profile,setProfile,water,setWater,waterTarget,setWaterTarget,setSleepHours,setLogs,logs}){

  const saveSleep=()=>{const hrs=calcSleep(sleepTime,wakeTime);setSleepHours(hrs);setLogs(l=>({...l,sleepHistory:[...(l.sleepHistory||[]),hrs]}));alert(`Sleep logged: ${hrs} hours 😴`);};

  return React.createElement("div",null,
    React.createElement("div",{style:{fontSize:22,fontWeight:700,letterSpacing:-0.5,marginBottom:16}},"Profile"),
    React.createElement("div",{style:card},

          React.createElement("div",{style:{color:C.gray,fontSize:13}},"Your avatar will appear here")),
      React.createElement("button",{style:btn(),onClick:genAvatar,disabled:avatarLoading},avatarLoading?"Generating...":"✨ Generate My Avatar")
    ),
    React.createElement("div",{style:card},
      React.createElement("div",{style:{fontSize:16,fontWeight:600,marginBottom:14}},"Personal Info"),
      fields.map(({k,l,p,t})=>React.createElement("div",{key:k,style:{marginBottom:12}},
        React.createElement("div",{style:lbl},l),
        React.createElement("input",{type:t||"text",style:inp,placeholder:p,value:form[k]||"",onChange:e=>setForm(x=>({...x,[k]:e.target.value}))})
      )),
      React.createElement("button",{style:{...btn(),marginTop:4},onClick:()=>setProfile(form)},"Save Profile")
    ),
    React.createElement("div",{style:card},
      React.createElement("div",{style:{fontSize:16,fontWeight:600,marginBottom:4}},"💧 Water Intake"),
      React.createElement("div",{style:{color:C.gray,fontSize:13,marginBottom:14}},"Track your daily water in litres."),
      React.createElement("div",{style:{marginBottom:10}},
        React.createElement("div",{style:lbl},"Daily Target (Litres)"),
        React.createElement("input",{type:"number",step:"0.1",style:inp,placeholder:"e.g. 3.0",value:waterTarget,onChange:e=>setWaterTarget(parseFloat(e.target.value)||3)})
      ),
      React.createElement("div",{style:{marginBottom:12}},
        React.createElement("div",{style:lbl},"Add Water (Litres)"),
        React.createElement("div",{style:{display:"flex",gap:8}},
          React.createElement("input",{type:"number",step:"0.1",style:{...inp,flex:1},placeholder:"e.g. 0.5",value:waterInput,onChange:e=>setWaterInput(e.target.value)}),

      React.createElement("div",{style:{marginTop:12}},
