// ── AUTO WAKE PING ──
const BACKEND_URL="https://shaktipith-backend.onrender.com";
function useWakePing(){
  useEffect(()=>{
    const ping=async()=>{
      try{await fetch(BACKEND_URL);}catch{}
    };
    ping(); // ping immediately on load
    const interval=setInterval(ping,4*60*1000); // ping every 4 mins to keep awake
    return()=>clearInterval(interval);
  },[]);
}

// ── SPARKLINE ──
function Sparkline({data,color,height=40}){
  if(!data||data.length<2)return React.createElement("div",{style:{height,display:"flex",alignItems:"center",justifyContent:"center"}},
    React.createElement("span",{style:{fontSize:11,color:C.gray}},"Log more data to see trend"));
  const w=300,h=height,min=Math.min(...data),max=Math.max(...data),range=max-min||1;
  const pts=data.map((v,i)=>`${(i/(data.length-1))*w},${h-((v-min)/range)*(h-8)-4}`).join(" ");
  const gid="g"+color.replace("#","")+(Math.random()*1000|0);
  return React.createElement("svg",{width:"100%",height:h,viewBox:`0 0 ${w} ${h}`,preserveAspectRatio:"none",style:{display:"block"}},
    React.createElement("defs",null,React.createElement("linearGradient",{id:gid,x1:"0",y1:"0",x2:"0",y2:"1"},
      React.createElement("stop",{offset:"0%",stopColor:color}),React.createElement("stop",{offset:"100%",stopColor:color,stopOpacity:"0"}))),
    React.createElement("polyline",{points:pts,fill:"none",stroke:color,strokeWidth:"2",strokeLinejoin:"round",strokeLinecap:"round"}),
    React.createElement("polygon",{points:`0,${h} ${pts} ${w},${h}`,fill:`url(#${gid})`,opacity:"0.15"})
  );
}

// ── RING ──
function Ring({pct,color,size=52,stroke=5}){
  const r=(size-stroke*2)/2,circ=2*Math.PI*r;
  return React.createElement("svg",{width:size,height:size},
    React.createElement("circle",{cx:size/2,cy:size/2,r,fill:"none",stroke:C.surface2,strokeWidth:stroke}),
    React.createElement("circle",{cx:size/2,cy:size/2,r,fill:"none",stroke:color,strokeWidth:stroke,
      strokeDasharray:circ,strokeDashoffset:circ*(1-Math.min(pct||0,1)),strokeLinecap:"round",
      transform:`rotate(-90 ${size/2} ${size/2})`,style:{transition:"stroke-dashoffset 0.6s"}})
  );
}

// ── API CALL via Render Backend ──
const BACKEND="https://shaktipith-backend.onrender.com";
async function callClaude(apiKey,messages,system="",max_tokens=1000){
  const res=await fetch(`${BACKEND}/api/chat`,{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({messages,system,max_tokens})
  });
  if(!res.ok){const e=await res.json();throw new Error(e.error?.message||"Server error");}
  const data=await res.json();
  return data.content?.[0]?.text||"No response.";
}

// ── API KEY GATE ──
function APIKeySetup({onSave}){
  const[key,setKey]=useState("");
  const[err,setErr]=useState("");
  const[testing,setTesting]=useState(false);
  const test=async()=>{
    if(!key.trim()){setErr("Please enter your API key.");return;}
    setTesting(true);setErr("");
    try{
      await callClaude(key.trim(),[{role:"user",content:"Say: ready"}],"Say exactly: ready");
      save("apiKey",key.trim());
      onSave(key.trim());
    }catch(e){setErr("Invalid API key. Please check and try again. Error: "+e.message);}
    setTesting(false);
  };
  return React.createElement("div",{style:{minHeight:"100vh",background:"#000",display:"flex",alignItems:"center",justifyContent:"center",padding:24}},
    React.createElement("div",{style:{maxWidth:400,width:"100%"}},

        React.createElement("div",{style:{color:C.gray,fontSize:13,marginBottom:16}},
          "Get your free key from ",
          React.createElement("a",{href:"https://console.anthropic.com",target:"_blank",style:{color:C.blue}},"console.anthropic.com"),
          " → API Keys → Create Key"),
        React.createElement("input",{style:{...inp,marginBottom:12},type:"password",placeholder:"sk-ant-...",value:key,onChange:e=>setKey(e.target.value),onKeyDown:e=>e.key==="Enter"&&test()}),
        err&&React.createElement("div",{style:{color:C.red,fontSize:13,marginBottom:12,background:C.red+"15",borderRadius:8,padding:"8px 12px"}},err),
        React.createElement("button",{style:{...btn(),width:"100%"},onClick:test,disabled:testing},
          testing?"Testing key...":"Connect & Start 🚀"),
        React.createElement("div",{style:{color:C.gray,fontSize:11,marginTop:12,textAlign:"center"}},"Your key is saved only on this device. Never shared.")
      )

}

// ── DASHBOARD ──
function Dashboard({logs,water,waterTarget,sleepHours,profile}){

            :d==="Sunday"?React.createElement("span",{style:{color:C.gray,fontSize:12}},"Rest")
            :React.createElement("span",{style:{color:C.gray2,fontSize:12}},"—")
        ),
        i<6&&React.createElement("div",{style:divLine})
      ))

    React.createElement("div",{style:card},
      React.createElement("div",{style:{...lbl,marginBottom:12}},"Recent Meals"),
      logs.food.length===0
        ?React.createElement("div",{style:{color:C.gray,fontSize:14,padding:"16px 0",textAlign:"center"}},"No meals yet. Use Food tab!")
        :logs.food.slice(-5).reverse().map((f,i)=>React.createElement("div",{key:i},
          React.createElement("div",{style:{display:"flex",justifyContent:"space-between",padding:"9px 0",fontSize:14}},

// ── WORKOUT ──
function Workout({logs,setLogs}){
  const[selDay,setSelDay]=useState(today);
  const existing=logs.workouts.find(w=>w.day===selDay);
  const[sets,setSets]=useState(existing?.exercises||{});
  const[cardioMin,setCardioMin]=useState("");
  const[cardioType,setCardioType]=useState("Running");
  const split=WORKOUT_SPLIT[selDay];
  useEffect(()=>{const e=logs.workouts.find(w=>w.day===selDay);setSets(e?.exercises||{});},[selDay,logs.workouts]);
  const upd=(ex,f,v)=>setSets(s=>({...s,[ex]:{...s[ex],[f]:v}}));
  const saveW=()=>{
    const updated=[...logs.workouts.filter(w=>w.day!==selDay),{day:selDay,exercises:sets,date:new Date().toLocaleDateString()}];
    setLogs(l=>{const n={...l,workouts:updated};save("logs",n);return n;});
    alert("Workout saved 💪");
  };
  const saveC=()=>{
    if(!cardioMin)return;
    const m=parseInt(cardioMin);
    setLogs(l=>{const n={...l,cardio:[...l.cardio,{type:cardioType,minutes:m,date:new Date().toLocaleDateString()}],cardioHistory:[...(l.cardioHistory||[]),m]};save("logs",n);return n;});
    setCardioMin("");alert("Cardio logged 🏃");

  return React.createElement("div",null,
    React.createElement("div",{style:{fontSize:22,fontWeight:700,letterSpacing:-0.5,marginBottom:16}},"Workout Tracker"),
    React.createElement("div",{style:{display:"flex",gap:4,overflowX:"auto",marginBottom:16,background:C.surface,borderRadius:12,padding:6}},
      DAYS.map(d=>React.createElement("button",{key:d,onClick:()=>setSelDay(d),style:{flexShrink:0,padding:"8px 10px",borderRadius:8,border:"none",cursor:"pointer",background:d===selDay?C.surface2:"transparent",color:d===selDay?"#fff":C.gray,fontSize:13,fontWeight:d===selDay?600:400,fontFamily:"inherit"}},d.slice(0,3)))

      React.createElement("div",{style:{color:C.blue,fontSize:13,marginBottom:14}},split.muscles),
      split.exercises.length===0

          React.createElement("div",{style:{display:"grid",gridTemplateColumns:"2fr 1fr 1fr 1fr",gap:6,marginBottom:8}},
            ["Exercise","Sets","Reps","Wt(kg)"].map(h=>React.createElement("div",{key:h,style:lbl},h))),
          split.exercises.map(ex=>React.createElement("div",{key:ex,style:{display:"grid",gridTemplateColumns:"2fr 1fr 1fr 1fr",gap:6,marginBottom:8,alignItems:"center"}},
            React.createElement("span",{style:{fontSize:13}},ex),
            ["sets","reps","weight"].map(f=>React.createElement("input",{key:f,type:"number",placeholder:"—",style:{...inp,padding:"8px 6px",fontSize:13},value:sets[ex]?.[f]||"",onChange:e=>upd(ex,f,e.target.value)}))
          )),
          React.createElement("button",{style:{...btn(),marginTop:10},onClick:saveW},"Save Workout ✓"))
    ),
    React.createElement("div",{style:card},
      React.createElement("div",{style:{fontSize:17,fontWeight:600,marginBottom:14}},"Cardio Logger"),
      React.createElement("div",{style:{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:10}},
        React.createElement("div",null,
          React.createElement("div",{style:lbl},"Type"),
          React.createElement("select",{style:inp,value:cardioType,onChange:e=>setCardioType(e.target.value)},

        React.createElement("div",null,

      ),
      React.createElement("button",{style:btn(C.green),onClick:saveC},"Log Cardio 🏃"),
      logs.cardio.length>0&&React.createElement("div",{style:{marginTop:14}},

// ── FOOD ANALYZER ──
function FoodAnalyzer({apiKey,logs,setLogs}){
  const[input,setInput]=useState("");
  const[imgFile,setImgFile]=useState(null);
  const[imgPreview,setImgPreview]=useState(null);
  const[result,setResult]=useState(null);
  const[loading,setLoading]=useState(false);
  const[err,setErr]=useState("");
  const fileRef=useRef();
  const handleImg=e=>{const f=e.target.files[0];if(!f)return;setImgFile(f);const r=new FileReader();r.onload=()=>setImgPreview(r.result);r.readAsDataURL(f);};
  const analyze=async()=>{
    if(!input&&!imgFile){setErr("Please enter a dish name or upload a photo.");return;}
    setLoading(true);setResult(null);setErr("");
    try{
      const prompt=`Analyze this Indian/home-cooked dish. Return ONLY valid JSON, no markdown, no extra text:\n{"dish":"name","serving":"estimated serving size","calories":number,"protein_g":number,"carbs_g":number,"total_fat_g":number,"good_fat_g":number,"bad_fat_g":number,"fiber_g":number,"pros":["benefit1","benefit2","benefit3"],"cons":["caution1","caution2"],"tip":"one practical health tip"}`;
      let messages;
      if(imgFile){
        messages=[{role:"user",content:[{type:"image",source:{type:"base64",media_type:imgFile.type,data:imgPreview.split(",")[1]}},{type:"text",text:prompt}]}];
      }else{
        messages=[{role:"user",content:`Dish: "${input}". ${prompt}`}];
      }
      const text=await callClaude(apiKey,messages,"You are a nutrition expert specializing in Indian and South Asian home-cooked meals. Always return only valid JSON with no extra text or markdown.");
      const clean=text.replace(/```json|```/g,"").trim();
      const parsed=JSON.parse(clean);
      setResult(parsed);
      setLogs(l=>{const n={...l,food:[...l.food,{name:parsed.dish,calories:parsed.calories,date:new Date().toLocaleDateString()}],calorieHistory:[...(l.calorieHistory||[]),parsed.calories]};save("logs",n);return n;});
    }catch(e){setErr("Could not analyze. Check your API key or try a clearer dish name. Error: "+e.message);}
    setLoading(false);
  };
  return React.createElement("div",null,
    React.createElement("div",{style:{fontSize:22,fontWeight:700,letterSpacing:-0.5,marginBottom:16}},"Food Analyzer"),
    React.createElement("div",{style:card},
      React.createElement("div",{style:{fontSize:16,fontWeight:600,marginBottom:4}},"What did you eat?"),
      React.createElement("div",{style:{color:C.gray,fontSize:13,marginBottom:14}},"Type any Indian dish or upload a photo — no measuring needed."),

        React.createElement("button",{style:{...btn(C.surface3),flex:1},onClick:()=>fileRef.current.click()},"📷 Upload Photo"),
        React.createElement("input",{ref:fileRef,type:"file",accept:"image/*",style:{display:"none"},onChange:handleImg}),
        React.createElement("button",{style:{...btn(),flex:2},onClick:analyze,disabled:loading},loading?"Analyzing...":"Analyze 🔍")
      ),
      err&&React.createElement("div",{style:{color:C.red,fontSize:13,background:C.red+"15",borderRadius:8,padding:"8px 12px",marginTop:8}},err),
      imgPreview&&React.createElement("img",{src:imgPreview,alt:"dish",style:{maxWidth:150,borderRadius:10,marginTop:10}})
    ),
    loading&&React.createElement("div",{style:{...card,textAlign:"center",padding:40}},
      React.createElement("div",{style:{fontSize:36,marginBottom:10}},"🤖"),
      React.createElement("div",{style:{color:C.blue,fontWeight:600}},"Analyzing your dish...")),
    result&&!result.error&&React.createElement("div",{style:card},
      React.createElement("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"flex-start",flexWrap:"wrap",gap:10,marginBottom:16}},
        React.createElement("div",null,
          React.createElement("div",{style:{fontSize:20,fontWeight:700,letterSpacing:-0.5}},result.dish),
          React.createElement("div",{style:{color:C.gray,fontSize:12,marginTop:2}},result.serving)),
        React.createElement("div",{style:{background:C.orange+"22",borderRadius:12,padding:"10px 16px",textAlign:"center",border:`1px solid ${C.orange}44`}},
          React.createElement("div",{style:{fontSize:26,fontWeight:800,color:C.orange}},result.calories),
          React.createElement("div",{style:{fontSize:10,color:C.gray,textTransform:"uppercase"}},"kcal"))
      ),
      React.createElement(Sparkline,{data:logs.calorieHistory||[],color:C.orange,height:40}),
      React.createElement("div",{style:{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:8,margin:"14px 0"}},
        [{l:"Protein",v:result.protein_g,c:C.blue},{l:"Carbs",v:result.carbs_g,c:C.yellow},{l:"Total Fat",v:result.total_fat_g,c:C.red},{l:"Good Fat",v:result.good_fat_g,c:C.green},{l:"Bad Fat",v:result.bad_fat_g,c:C.red},{l:"Fiber",v:result.fiber_g,c:C.purple}].map(m=>

            React.createElement("div",{style:{fontSize:18,fontWeight:700,color:m.c}},m.v,React.createElement("span",{style:{fontSize:10,color:C.gray}},"g")),
            React.createElement("div",{style:{fontSize:10,color:C.gray,marginTop:2}},m.l))

// ── AI COACH ──
function AICoach({apiKey,logs,water,waterTarget,sleepHours,profile}){

      React.createElement("div",{style:{width:50,height:50,borderRadius:"50%",background:"linear-gradient(135deg,#ff9f0a,#ff453a)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:22}},"🧘"),
      React.createElement("div",null,
        React.createElement("div",{style:{fontSize:18,fontWeight:700}},"Guruji"),
        React.createElement("div",{style:{color:C.green,fontSize:12}},"● Online · 30 Years Experience"))
    ),
    React.createElement("div",{style:{...card,height:380,overflowY:"auto",display:"flex",flexDirection:"column",gap:10}},
      msgs.map((m,i)=>React.createElement("div",{key:i,style:{display:"flex",justifyContent:m.role==="ai"?"flex-start":"flex-end"}},
        React.createElement("div",{style:{background:m.role==="ai"?C.surface2:C.blue,borderRadius:m.role==="ai"?"4px 16px 16px 16px":"16px 4px 16px 16px",padding:"10px 14px",maxWidth:"85%",fontSize:13,lineHeight:1.7,whiteSpace:"pre-wrap"}},m.text)
      )),
      loading&&React.createElement("div",{style:{alignSelf:"flex-start",display:"flex",alignItems:"center",gap:10}},
        React.createElement("div",{style:{width:36,height:36,borderRadius:"50%",background:"linear-gradient(135deg,#ff9f0a,#ff453a)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:18,animation:"spin 1s linear infinite"}},"🧘"),
        React.createElement("div",{style:{background:C.surface2,borderRadius:"4px 16px 16px 16px",padding:"10px 16px",fontSize:13}},
          React.createElement("span",{style:{color:C.orange,fontWeight:600}},"Guruji is thinking"),
          React.createElement("span",{style:{color:C.orange,animation:"dots 1.4s infinite",display:"inline-block"}},"...")
        )

      React.createElement("button",{style:btn(),onClick:()=>send()},"Send")

// ── PROFILE ──
function Profile({apiKey,profile,setProfile,water,setWater,waterTarget,setWaterTarget,setSleepHours,sleepHours,setLogs,logs,onResetKey}){
  const[form,setForm]=useState(profile);
  const[sleepTime,setSleepTime]=useState(load("sleepTime","22:30"));
  const[wakeTime,setWakeTime]=useState(load("wakeTime","06:30"));
  const[waterInput,setWaterInput]=useState("");
  const[avatar,setAvatar]=useState(load("avatar",""));
  const[avatarLoading,setAvatarLoading]=useState(false);
  const calcSleep=(s,w)=>{const[sh,sm]=s.split(":").map(Number);const[wh,wm]=w.split(":").map(Number);let m=(wh*60+wm)-(sh*60+sm);if(m<0)m+=1440;return parseFloat((m/60).toFixed(1));};
  const saveSleep=()=>{
    const hrs=calcSleep(sleepTime,wakeTime);
    setSleepHours(hrs);
    save("sleepHours",hrs);
    save("sleepTime",sleepTime);
    save("wakeTime",wakeTime);
    setLogs(l=>{const n={...l,sleepHistory:[...(l.sleepHistory||[]),hrs]};save("logs",n);return n;});
    alert(`Sleep logged: ${hrs} hours 😴`);
  };
  const logWater=()=>{
    const a=parseFloat(waterInput);if(!a||a<=0)return;
    const nw=parseFloat((water+a).toFixed(2));
    setWater(nw);
    save("water",nw);
    setLogs(l=>{const n={...l,waterHistory:[...(l.waterHistory||[]),nw]};save("logs",n);return n;});
    setWaterInput("");
  };
  const genAvatar=async()=>{
    if(!form.name){alert("Please fill your name first!");return;}
    setAvatarLoading(true);
    try{
      const desc=`Name:${form.name}, Age:${form.age||"?"}, Height:${form.height||"?"}cm, Weight:${form.weight||"?"}kg, Body type:${form.bodyType||"athletic"}, Face shape:${form.face||"oval"}, Fitness goal:${form.goal||"fitness"}`;
      const resp=await callClaude(apiKey,[{role:"user",content:`Create a unique, fun emoji-based fitness warrior avatar for this person. Use emojis creatively to represent their physical appearance, personality, and fitness journey. Make it motivating, energetic, and personal. Include their warrior name.\n\nPerson: ${desc}`}],"You are a creative fitness avatar designer. Create fun emoji-rich avatars. Be creative, motivating and personal.");
      setAvatar(resp);save("avatar",resp);
    }catch(e){alert("Avatar generation failed: "+e.message);}
    setAvatarLoading(false);
  };
  const saveProfile=()=>{setProfile(form);save("profile",form);alert("Profile saved! 🙏");};
  const resetKey=()=>{if(confirm("Reset API key? You will need to enter it again.")){localStorage.removeItem("apiKey");onResetKey();}};
  const fields=[{k:"name",l:"Name",p:"Your name"},{k:"age",l:"Age",p:"Years",t:"number"},{k:"height",l:"Height (cm)",p:"e.g. 175",t:"number"},{k:"weight",l:"Weight (kg)",p:"e.g. 70",t:"number"},{k:"bodyType",l:"Body Type",p:"Ectomorph / Mesomorph / Endomorph"},{k:"face",l:"Face Shape",p:"Oval / Round / Square / Heart"},{k:"goal",l:"Fitness Goal",p:"Fat loss / Muscle gain / Endurance"}];
  return React.createElement("div",null,
    React.createElement("div",{style:{fontSize:22,fontWeight:700,letterSpacing:-0.5,marginBottom:16}},"Profile"),
    // Avatar
    React.createElement("div",{style:card},
      React.createElement("div",{style:{fontSize:16,fontWeight:600,marginBottom:4}},"✨ Your Fitness Avatar"),
      React.createElement("div",{style:{color:C.gray,fontSize:13,marginBottom:14}},"Fill your profile below then generate your AI avatar."),
      avatar
        ?React.createElement("div",{style:{background:C.surface2,borderRadius:14,padding:16,fontSize:14,lineHeight:1.9,whiteSpace:"pre-wrap",marginBottom:12}},avatar)
        :React.createElement("div",{style:{background:C.surface2,borderRadius:14,padding:28,textAlign:"center",marginBottom:12}},
          React.createElement("div",{style:{fontSize:44,marginBottom:8}},"🏋️‍♂️"),
          React.createElement("div",{style:{color:C.gray,fontSize:13}},"Your warrior avatar will appear here")),
      React.createElement("button",{style:btn(),onClick:genAvatar,disabled:avatarLoading},avatarLoading?"Generating...":"✨ Generate My Avatar")
    ),
    // Personal Info
    React.createElement("div",{style:card},
      React.createElement("div",{style:{fontSize:16,fontWeight:600,marginBottom:14}},"Personal Info"),
      fields.map(({k,l,p,t})=>React.createElement("div",{key:k,style:{marginBottom:12}},
        React.createElement("div",{style:lbl},l),
        React.createElement("input",{type:t||"text",style:inp,placeholder:p,value:form[k]||"",onChange:e=>setForm(x=>({...x,[k]:e.target.value}))})
      )),
      React.createElement("button",{style:{...btn(),marginTop:4},onClick:saveProfile},"Save Profile 💾")
    ),
    // Water
    React.createElement("div",{style:card},
      React.createElement("div",{style:{fontSize:16,fontWeight:600,marginBottom:4}},"💧 Water Intake"),
      React.createElement("div",{style:{color:C.gray,fontSize:13,marginBottom:14}},"Track your daily water in litres."),
      React.createElement("div",{style:{marginBottom:12}},
        React.createElement("div",{style:lbl},"Daily Target (Litres)"),
        React.createElement("input",{type:"number",step:"0.1",style:inp,placeholder:"e.g. 3.0",value:waterTarget,onChange:e=>{const v=parseFloat(e.target.value)||3;setWaterTarget(v);save("waterTarget",v);}})
      ),
      React.createElement("div",{style:{marginBottom:14}},
        React.createElement("div",{style:lbl},"Add Water (Litres)"),
        React.createElement("div",{style:{display:"flex",gap:8}},
          React.createElement("input",{type:"number",step:"0.1",style:{...inp,flex:1},placeholder:"e.g. 0.25, 0.5, 1.0",value:waterInput,onChange:e=>setWaterInput(e.target.value),onKeyDown:e=>e.key==="Enter"&&logWater()}),
          React.createElement("button",{style:btn(C.teal),onClick:logWater},"Add"))
      ),
      React.createElement("div",{style:{display:"flex",alignItems:"center",gap:10,marginBottom:10}},
        React.createElement("div",{style:{flex:1,background:C.surface2,borderRadius:99,height:8,overflow:"hidden"}},
          React.createElement("div",{style:{width:`${Math.min((water/waterTarget)*100,100)}%`,height:"100%",background:C.teal,borderRadius:99,transition:"width 0.5s"}})),
        React.createElement("span",{style:{color:C.teal,fontWeight:700,fontSize:14,whiteSpace:"nowrap"}},water.toFixed(1)+" / "+waterTarget+"L")
      ),
      React.createElement("button",{style:{...btn(C.surface3,{fontSize:13,padding:"8px 14px"}),marginBottom:10},onClick:()=>{setWater(0);save("water",0);}},
        "Reset Today's Water"),
      React.createElement(Sparkline,{data:logs.waterHistory||[],color:C.teal,height:36})
    ),
    // Sleep
    React.createElement("div",{style:card},
      React.createElement("div",{style:{fontSize:16,fontWeight:600,marginBottom:4}},"🌙 Sleep Tracker"),
      React.createElement("div",{style:{color:C.gray,fontSize:13,marginBottom:14}},"Enter sleep & wake time — duration calculated automatically."),
      React.createElement("div",{style:{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:12}},
        React.createElement("div",null,
          React.createElement("div",{style:lbl},"Sleep Time"),
          React.createElement("input",{type:"time",style:inp,value:sleepTime,onChange:e=>setSleepTime(e.target.value)})),
        React.createElement("div",null,
          React.createElement("div",{style:lbl},"Wake Up Time"),
          React.createElement("input",{type:"time",style:inp,value:wakeTime,onChange:e=>setWakeTime(e.target.value)}))
      ),
      React.createElement("div",{style:{background:C.surface2,borderRadius:10,padding:"12px 14px",display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}},
        React.createElement("span",{style:{color:C.gray,fontSize:13}},"Calculated Duration"),

      React.createElement("div",{style:{marginTop:12}},
        React.createElement(Sparkline,{data:logs.sleepHistory||[],color:C.purple,height:36}))
    ),
    // API Key reset
    React.createElement("div",{style:{...card,border:`1px solid ${C.red}33`}},
      React.createElement("div",{style:{fontSize:16,fontWeight:600,marginBottom:4}},"🔑 API Key"),
      React.createElement("div",{style:{color:C.gray,fontSize:13,marginBottom:12}},"Your API key is saved on this device securely."),
      React.createElement("button",{style:{...btn(C.red,{fontSize:13,padding:"8px 16px"})},onClick:resetKey},"Reset API Key")
    )

}
